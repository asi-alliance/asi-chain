version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: asi-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-asi_chain}
      POSTGRES_USER: ${DB_USER:-asi_admin}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - asi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-asi_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: asi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - asi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Hasura GraphQL Engine
  hasura:
    image: hasura/graphql-engine:v2.35.0
    container_name: asi-hasura
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${DB_USER:-asi_admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-asi_chain}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_JWT_SECRET: |
        {
          "type": "HS256",
          "key": "${JWT_SECRET}"
        }
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    ports:
      - "8080:8080"
    networks:
      - asi-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ASI Wallet v2
  wallet:
    build:
      context: ./asi_wallet_v2
      dockerfile: Dockerfile
    container_name: asi-wallet
    env_file:
      - ./asi_wallet_v2/.env
    ports:
      - "3000:3000"
    networks:
      - asi-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Blockchain Explorer
  explorer:
    build:
      context: ./explorer
      dockerfile: Dockerfile
    container_name: asi-explorer
    env_file:
      - ./explorer/.env
    ports:
      - "3001:3001"
    networks:
      - asi-network
    depends_on:
      hasura:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Indexer
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: asi-indexer
    env_file:
      - ./indexer/.env
    ports:
      - "9090:9090"  # Monitoring port
    networks:
      - asi-network
    depends_on:
      postgres:
        condition: service_healthy
      hasura:
        condition: service_healthy
    volumes:
      - ./indexer/logs:/var/log/asi-indexer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: asi-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - asi-network
    depends_on:
      - wallet
      - explorer
      - indexer
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: asi-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9091:9090"
    networks:
      - asi-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: asi-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3002:3000"
    networks:
      - asi-network
    depends_on:
      - prometheus

networks:
  asi-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt