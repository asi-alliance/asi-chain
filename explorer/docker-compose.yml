# ASI-Chain Explorer Docker Compose Configuration
# Simple explorer-only setup that connects to external indexer services

services:
  # ASI Explorer (Production Build)
  asi-explorer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: asi-explorer
    ports:
      - "3001:80"
    environment:
      # GraphQL API Configuration (connects to external Hasura)
      - REACT_APP_GRAPHQL_URL=http://localhost:8080/v1/graphql
      - REACT_APP_GRAPHQL_WS_URL=ws://localhost:8080/v1/graphql
      - REACT_APP_HASURA_ADMIN_SECRET=myadminsecretkey
      
      # RChain Node Configuration (for wallet balance)
      - REACT_APP_RCHAIN_NODE_URL=http://localhost:40453
      
      # Application Configuration
      - REACT_APP_ENVIRONMENT=production
      - REACT_APP_API_TIMEOUT=30000
      - REACT_APP_BRAND_NAME=ASI Chain Explorer
      - REACT_APP_BRAND_SUBTITLE=Powered by GraphQL
      
      # Node Environment
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ASI Explorer (Development Mode)
  asi-explorer-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: asi-explorer-dev
    ports:
      - "3002:3000"
    environment:
      # GraphQL API Configuration (connects to external Hasura)
      - REACT_APP_GRAPHQL_URL=http://localhost:8080/v1/graphql
      - REACT_APP_GRAPHQL_WS_URL=ws://localhost:8080/v1/graphql
      - REACT_APP_HASURA_ADMIN_SECRET=myadminsecretkey
      
      # RChain Node Configuration
      - REACT_APP_RCHAIN_NODE_URL=http://localhost:40453
      
      # Development Configuration
      - REACT_APP_ENVIRONMENT=development
      - REACT_APP_API_TIMEOUT=30000
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - dev