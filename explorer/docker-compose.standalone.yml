version: '3.8'

services:
  asi-explorer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        # Build args to pass environment at build time
        - REACT_APP_GRAPHQL_URL=http://184.73.0.34/:8080/v1/graphql
        - REACT_APP_GRAPHQL_WS_URL=ws://184.73.0.34:8080/v1/graphql
        - REACT_APP_INDEXER_API_URL=http://184.73.0.34:9090
        - REACT_APP_HASURA_ADMIN_SECRET=myadminsecretkey
    container_name: asi-explorer
    image: asi-explorer:latest
    ports:
      - "3001:80"  # Map to port 3001 on host (explorer default)
    environment:
      - REACT_APP_GRAPHQL_URL=http://184.73.0.34:8080/v1/graphql
      - REACT_APP_GRAPHQL_WS_URL=ws://184.73.0.34:8080/v1/graphql
      - REACT_APP_INDEXER_API_URL=http://184.73.0.34:9090
      - REACT_APP_HASURA_ADMIN_SECRET=myadminsecretkey
      - REACT_APP_NETWORK_NAME=ASI Chain
      - REACT_APP_ENVIRONMENT=production
      - NODE_ENV=production
    networks:
      - asi-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.asichain.service=explorer"
      - "com.asichain.description=ASI Chain Blockchain Explorer"
      - "com.asichain.version=1.0.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  asi-network:
    driver: bridge
    name: asi-network