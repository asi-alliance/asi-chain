<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7FD67A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7FD67A;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="connectionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4F0C1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with subtle pattern -->
  <rect width="500" height="500" fill="#0a0f14"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a2028" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="500" height="500" fill="url(#grid)"/>
  
  <!-- Central ASI Hub -->
  <g id="asiHub" transform="translate(250, 250)">
    <!-- Outer ring -->
    <circle r="50" fill="none" stroke="#7FD67A" stroke-width="2" opacity="0.3">
      <animate attributeName="r" values="45;55;45" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Middle ring -->
    <circle r="35" fill="none" stroke="#A8E6A3" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Core -->
    <circle r="20" fill="url(#aiGlow)"/>
    <circle r="15" fill="#7FD67A">
      <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- ASI Symbol in center -->
    <g fill="#000" opacity="0.8">
      <circle cx="0" cy="0" r="2"/>
      <circle cx="0" cy="-8" r="3"/>
      <circle cx="0" cy="8" r="3"/>
      <circle cx="-8" cy="0" r="3"/>
      <circle cx="8" cy="0" r="3"/>
      <circle cx="-5" cy="-5" r="2"/>
      <circle cx="5" cy="-5" r="2"/>
      <circle cx="-5" cy="5" r="2"/>
      <circle cx="5" cy="5" r="2"/>
    </g>
    
    <text y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7FD67A" font-weight="bold">
      ASI Intelligence Hub
    </text>
  </g>
  
  <!-- AI Agent Nodes -->
  <!-- Fetch.ai Agent -->
  <g id="fetchAgent" transform="translate(120, 120)">
    <circle r="25" fill="url(#aiGlow)">
      <animate attributeName="r" values="20;30;20" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="#A8E6A3"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#000" font-weight="bold">FET</text>
    <text y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8E6A3">Fetch.ai</text>
    
    <!-- Data packets -->
    <g fill="#7FD67A">
      <circle r="2">
        <animateMotion dur="2s" repeatCount="indefinite">
          <mpath href="#fetchPath"/>
        </animateMotion>
      </circle>
    </g>
  </g>
  
  <!-- SingularityNET Agent -->
  <g id="snetAgent" transform="translate(380, 120)">
    <circle r="25" fill="url(#aiGlow)">
      <animate attributeName="r" values="20;30;20" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="#A8E6A3"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#000" font-weight="bold">SNET</text>
    <text y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#A8E6A3">SingularityNET</text>
    
    <!-- Data packets -->
    <g fill="#7FD67A">
      <circle r="2">
        <animateMotion dur="2.5s" repeatCount="indefinite">
          <mpath href="#snetPath"/>
        </animateMotion>
      </circle>
    </g>
  </g>
  
  <!-- Ocean Protocol Agent -->
  <g id="oceanAgent" transform="translate(120, 380)">
    <circle r="25" fill="url(#aiGlow)">
      <animate attributeName="r" values="20;30;20" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="#A8E6A3"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#000" font-weight="bold">OCEAN</text>
    <text y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8E6A3">Ocean</text>
    
    <!-- Data packets -->
    <g fill="#7FD67A">
      <circle r="2">
        <animateMotion dur="3s" repeatCount="indefinite">
          <mpath href="#oceanPath"/>
        </animateMotion>
      </circle>
    </g>
  </g>
  
  <!-- CUDOS Agent -->
  <g id="cudosAgent" transform="translate(380, 380)">
    <circle r="25" fill="url(#aiGlow)">
      <animate attributeName="r" values="20;30;20" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="#A8E6A3"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#000" font-weight="bold">CUDOS</text>
    <text y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8E6A3">CUDOS</text>
    
    <!-- Data packets -->
    <g fill="#7FD67A">
      <circle r="2">
        <animateMotion dur="2.2s" repeatCount="indefinite">
          <mpath href="#cudosPath"/>
        </animateMotion>
      </circle>
    </g>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="url(#connectionGradient)" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 140 140 L 230 230">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 360 140 L 270 230">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 140 360 L 230 270">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 360 360 L 270 270">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Inter-agent connections -->
    <path d="M 140 140 L 360 140" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M 140 360 L 360 360" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" begin="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 140 140 L 140 360" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" begin="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 360 140 L 360 360" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" begin="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Hidden paths for data packet animation -->
  <defs>
    <path id="fetchPath" d="M 15 0 Q 80 -50 130 -20" fill="none"/>
    <path id="snetPath" d="M -15 0 Q -80 -50 -130 -20" fill="none"/>
    <path id="oceanPath" d="M 15 0 Q 80 50 130 20" fill="none"/>
    <path id="cudosPath" d="M -15 0 Q -80 50 -130 20" fill="none"/>
  </defs>
  
  <!-- Title -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7FD67A">
    AI Alliance Network
  </text>
  
  <!-- Subtitle -->
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#A8E6A3">
    Decentralized AI Agents on ASI Chain
  </text>
  
  <!-- Status indicators -->
  <g transform="translate(20, 450)">
    <circle r="4" fill="#7FD67A">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#7FD67A">Active Network</text>
    
    <circle cx="120" cy="0" r="4" fill="#A8E6A3">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="135" y="5" font-family="Arial, sans-serif" font-size="10" fill="#A8E6A3">4 AI Agents Online</text>
  </g>
  
  <!-- Rotating outer ring -->
  <g transform="translate(250, 250)">
    <circle r="80" fill="none" stroke="#7FD67A" stroke-width="1" opacity="0.2" stroke-dasharray="5,5">
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>