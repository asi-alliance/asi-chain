<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FD67A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4F0C1;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" fill="#ffffff"/>
  
  <!-- Network visualization -->
  <g id="network">
    <!-- Center ASI Chain node with proper logo structure -->
    <g transform="translate(300, 100)">
      <!-- Background circle -->
      <circle cx="0" cy="0" r="30" fill="url(#asiGradient)" opacity="0.3"/>
      <circle cx="0" cy="0" r="25" fill="#A8E6A3" filter="url(#glow)">
        <animate attributeName="r" values="25;28;25" dur="2s" repeatCount="indefinite"/>
      </circle>
      
      <!-- ASI Logo simplified -->
      <g transform="scale(0.5)" fill="#1A1A1A">
        <!-- Center -->
        <circle cx="0" cy="0" r="5"/>
        <!-- Left branch -->
        <ellipse cx="-20" cy="0" rx="10" ry="7"/>
        <circle cx="-20" cy="-12" r="5"/>
        <circle cx="-20" cy="12" r="5"/>
        <!-- Right branch -->
        <ellipse cx="20" cy="0" rx="10" ry="7"/>
        <circle cx="20" cy="-12" r="5"/>
        <circle cx="20" cy="12" r="5"/>
        <!-- Connector -->
        <rect x="-15" y="-3" width="30" height="6" rx="3"/>
      </g>
    </g>
    
    <!-- Validator nodes arranged around center -->
    <g id="validators">
      <!-- Validator 1 - Top Left -->
      <g transform="translate(200, 50)">
        <circle cx="0" cy="0" r="20" fill="#C4F0C1" stroke="#7FD67A" stroke-width="2">
          <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="5" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-weight="600" font-size="12">V1</text>
      </g>
      
      <!-- Validator 2 - Top Right -->
      <g transform="translate(400, 50)">
        <circle cx="0" cy="0" r="20" fill="#C4F0C1" stroke="#7FD67A" stroke-width="2">
          <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="3s" begin="0.75s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="5" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-weight="600" font-size="12">V2</text>
      </g>
      
      <!-- Validator 3 - Bottom Left -->
      <g transform="translate(200, 150)">
        <circle cx="0" cy="0" r="20" fill="#C4F0C1" stroke="#7FD67A" stroke-width="2">
          <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="3s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="5" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-weight="600" font-size="12">V3</text>
      </g>
      
      <!-- Validator 4 - Bottom Right -->
      <g transform="translate(400, 150)">
        <circle cx="0" cy="0" r="20" fill="#C4F0C1" stroke="#7FD67A" stroke-width="2">
          <animate attributeName="fill-opacity" values="0.8;1;0.8" dur="3s" begin="2.25s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="5" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-weight="600" font-size="12">V4</text>
      </g>
    </g>
    
    <!-- Alliance member nodes -->
    <g id="alliance" opacity="0.7">
      <!-- Fetch.ai - Left -->
      <g transform="translate(100, 100)">
        <circle cx="0" cy="0" r="15" fill="#E8F5E8" stroke="#A8E6A3" stroke-width="1.5"/>
        <text x="0" y="4" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="9" font-weight="500">FET</text>
      </g>
      
      <!-- SingularityNET - Right -->
      <g transform="translate(500, 100)">
        <circle cx="0" cy="0" r="15" fill="#E8F5E8" stroke="#A8E6A3" stroke-width="1.5"/>
        <text x="0" y="4" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="9" font-weight="500">AGIX</text>
      </g>
      
      <!-- Ocean Protocol - Top -->
      <g transform="translate(300, 30)">
        <circle cx="0" cy="0" r="15" fill="#E8F5E8" stroke="#A8E6A3" stroke-width="1.5"/>
        <text x="0" y="4" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="9" font-weight="500">OCEAN</text>
      </g>
      
      <!-- CUDOS - Bottom -->
      <g transform="translate(300, 170)">
        <circle cx="0" cy="0" r="15" fill="#E8F5E8" stroke="#A8E6A3" stroke-width="1.5"/>
        <text x="0" y="4" text-anchor="middle" fill="#1A1A1A" font-family="Inter, sans-serif" font-size="9" font-weight="500">CUDOS</text>
      </g>
    </g>
    
    <!-- Connection lines with animation -->
    <g id="connections" stroke="#7FD67A" stroke-width="1.5" fill="none" opacity="0.5">
      <!-- Center to validators -->
      <line x1="300" y1="100" x2="200" y2="50">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="300" y1="100" x2="400" y2="50">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="300" y1="100" x2="200" y2="150">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
      </line>
      <line x1="300" y1="100" x2="400" y2="150">
        <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </line>
      
      <!-- Center to alliance members (dashed) -->
      <line x1="300" y1="100" x2="100" y2="100" stroke-dasharray="4,4" opacity="0.3"/>
      <line x1="300" y1="100" x2="500" y2="100" stroke-dasharray="4,4" opacity="0.3"/>
      <line x1="300" y1="100" x2="300" y2="30" stroke-dasharray="4,4" opacity="0.3"/>
      <line x1="300" y1="100" x2="300" y2="170" stroke-dasharray="4,4" opacity="0.3"/>
    </g>
    
    <!-- Data flow particles -->
    <g id="particles">
      <circle r="3" fill="#7FD67A">
        <animateMotion dur="2s" repeatCount="indefinite">
          <mpath href="#path1"/>
        </animateMotion>
      </circle>
      <circle r="3" fill="#A8E6A3">
        <animateMotion dur="2s" begin="0.5s" repeatCount="indefinite">
          <mpath href="#path2"/>
        </animateMotion>
      </circle>
      <circle r="3" fill="#7FD67A">
        <animateMotion dur="2s" begin="1s" repeatCount="indefinite">
          <mpath href="#path3"/>
        </animateMotion>
      </circle>
      <circle r="3" fill="#A8E6A3">
        <animateMotion dur="2s" begin="1.5s" repeatCount="indefinite">
          <mpath href="#path4"/>
        </animateMotion>
      </circle>
    </g>
    
    <!-- Paths for particles -->
    <path id="path1" d="M 300 100 L 200 50" fill="none"/>
    <path id="path2" d="M 300 100 L 400 50" fill="none"/>
    <path id="path3" d="M 300 100 L 200 150" fill="none"/>
    <path id="path4" d="M 300 100 L 400 150" fill="none"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#808080">ASI Chain Network Topology</text>
</svg>