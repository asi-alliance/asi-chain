# ASI Chain PostgreSQL Security Configuration
# This configuration provides comprehensive database security hardening

# Connection Security
ssl = on
ssl_cert_file = '/etc/ssl/certs/postgresql.crt'
ssl_key_file = '/etc/ssl/private/postgresql.key'
ssl_ca_file = '/etc/ssl/certs/ca-certificates.crt'
ssl_crl_file = ''

# SSL Configuration
ssl_ciphers = 'ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:AES256-GCM-SHA384:AES256-SHA256:AES256-SHA'
ssl_prefer_server_ciphers = on
ssl_protocols = 'TLSv1.2,TLSv1.3'

# Authentication and Authorization
password_encryption = scram-sha-256
db_user_namespace = off

# Connection Limits and Timeouts
max_connections = 200
superuser_reserved_connections = 3
authentication_timeout = 60s
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# Logging for Security Auditing
log_destination = 'stderr'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_checkpoints = on
log_lock_waits = on
log_statement = 'ddl'
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Security-related logging
log_min_messages = warning
log_min_error_statement = error

# Memory and Performance (Security-focused)
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
wal_buffers = 16MB

# Write-Ahead Logging (WAL) Security
wal_level = replica
archive_mode = on
archive_command = '/usr/local/bin/archive_wal.sh %p %f'
max_wal_senders = 3
wal_keep_segments = 32

# Data Checksums (enable during initdb)
data_checksums = on

# Row Level Security
row_security = on

# Restrict functions that could be security risks
allow_system_table_mods = off
exit_on_error = off

# Network Security
listen_addresses = 'localhost,172.16.0.0/12,10.0.0.0/8'
port = 5432

# Prevent unauthorized access
unix_socket_directories = '/var/run/postgresql'
unix_socket_group = 'postgres'
unix_socket_permissions = 0770

# Statement timeout to prevent DoS
statement_timeout = 60000  # 60 seconds
lock_timeout = 30000       # 30 seconds
idle_in_transaction_session_timeout = 300000  # 5 minutes

# Vacuum and maintenance
autovacuum = on
track_counts = on
track_activities = on
track_io_timing = on

# Encryption at rest (requires additional setup)
# cluster_name = 'asi_chain_encrypted'