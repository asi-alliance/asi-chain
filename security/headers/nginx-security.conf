# ASI Chain - Nginx Security Headers Configuration
# This configuration provides comprehensive security headers for all web services

# Security Headers Block
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "cross-origin" always;

# Strict Transport Security (HSTS)
# Enable after SSL certificate is properly configured
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Content Security Policy (CSP)
# Wallet-specific CSP - more permissive for React app functionality
set $wallet_csp "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: https: http:; worker-src 'self' blob:; child-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';";

# Explorer-specific CSP - stricter for public-facing explorer
set $explorer_csp "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https:; worker-src 'self'; child-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';";

# API-specific CSP - most restrictive for API endpoints
set $api_csp "default-src 'none'; frame-ancestors 'none'; form-action 'none'; base-uri 'none';";

# Feature Policy (Permissions Policy)
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), display-capture=(), clipboard-read=(), clipboard-write=(self)" always;

# Cache Control for Security-Sensitive Resources
location ~* \.(js|css|html)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

# Hide Server Information
server_tokens off;
more_clear_headers Server;
more_set_headers "Server: ASI-Chain";

# Rate Limiting Configuration
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=assets:10m rate=50r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;

# Connection Limiting
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_conn conn_limit_per_ip 20;

# Request Size Limits
client_max_body_size 1M;
client_body_buffer_size 32k;
client_header_buffer_size 1k;
large_client_header_buffers 4 8k;