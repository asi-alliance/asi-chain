# ASI Chain Explorer - Nginx Configuration with Security Headers
# This configuration provides secure hosting for the ASI Chain Explorer

server {
    listen 80;
    listen [::]:80;
    server_name explorer.asi-chain.io;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name explorer.asi-chain.io;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/explorer.asi-chain.io.crt;
    ssl_certificate_key /etc/ssl/private/explorer.asi-chain.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # Include base security headers
    include /etc/nginx/conf.d/security-headers.conf;
    
    # Explorer-specific Content Security Policy (stricter than wallet)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https:; worker-src 'self'; child-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    
    # Document root
    root /var/www/explorer;
    index index.html;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Main location block
    location / {
        try_files $uri $uri/ /index.html;
        
        # Rate limiting for general requests
        limit_req zone=general burst=30 nodelay;
        limit_conn conn_limit_per_ip 15;
        
        # Security headers for HTML files
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }
    }
    
    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        limit_req zone=assets burst=100 nodelay;
        
        # Additional security for JS files
        location ~* \.js$ {
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
    
    # GraphQL API proxy with security
    location /graphql {
        # Strict rate limiting for GraphQL
        limit_req zone=api burst=10 nodelay;
        limit_conn conn_limit_per_ip 3;
        
        # Proxy to Hasura
        proxy_pass http://asi-hasura:8080/v1/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers for API
        add_header X-API-Version "2.0" always;
        add_header X-RateLimit-Limit "10" always;
        add_header X-RateLimit-Remaining "10" always;
        
        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Request size limits for GraphQL
        client_max_body_size 100k;
    }
    
    # WebSocket proxy for GraphQL subscriptions
    location /graphql-ws {
        # Rate limiting for WebSocket connections
        limit_req zone=api burst=5 nodelay;
        limit_conn conn_limit_per_ip 2;
        
        proxy_pass http://asi-hasura:8080/v1/graphql;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Status endpoint with basic info
    location /status {
        limit_req zone=general burst=5 nodelay;
        return 200 '{"service":"asi-explorer","version":"2.0","status":"healthy"}';
        add_header Content-Type application/json;
    }
    
    # Block access to sensitive files
    location ~* \.(env|log|sql|conf|config|bak|backup|old|tmp|temp)$ {
        deny all;
        return 404;
    }
    
    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
    
    # Block common exploit attempts
    location ~* (wp-admin|wp-content|wp-includes|phpmyadmin|admin|administrator) {
        deny all;
        return 404;
    }
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /var/www/errors;
        internal;
    }
    
    location = /50x.html {
        root /var/www/errors;
        internal;
    }
}