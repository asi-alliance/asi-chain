apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: k8s.io/ingress-nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asi-chain-ingress
  namespace: asi-chain
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "50"
spec:
  tls:
  - hosts:
    - api.testnet.asi-chain.io
    - explorer.testnet.asi-chain.io
    - wallet.testnet.asi-chain.io
    - faucet.testnet.asi-chain.io
    - rpc.testnet.asi-chain.io
    - ws.testnet.asi-chain.io
    secretName: asi-chain-tls
  rules:
  # API Endpoint
  - host: api.testnet.asi-chain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80
  
  # Explorer
  - host: explorer.testnet.asi-chain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: explorer-service
            port:
              number: 80
  
  # Wallet
  - host: wallet.testnet.asi-chain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wallet-service
            port:
              number: 80
  
  # Faucet
  - host: faucet.testnet.asi-chain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: faucet-service
            port:
              number: 80
  
  # RPC Endpoint
  - host: rpc.testnet.asi-chain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rpc-service
            port:
              number: 8545
  
  # WebSocket Endpoint
  - host: ws.testnet.asi-chain.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ws-service
            port:
              number: 8546
---
# Certificate Issuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ssl@asi-chain.io
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
# Certificate for staging (optional)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ssl@asi-chain.io
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
---
# RPC Service (Load balances across validators)
apiVersion: v1
kind: Service
metadata:
  name: rpc-service
  namespace: asi-chain
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  ports:
  - port: 8545
    targetPort: 8545
    protocol: TCP
    name: rpc
  selector:
    app: validator
---
# WebSocket Service
apiVersion: v1
kind: Service
metadata:
  name: ws-service
  namespace: asi-chain
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  ports:
  - port: 8546
    targetPort: 8546
    protocol: TCP
    name: ws
  selector:
    app: validator
---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: asi-chain
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: api
---
# Explorer Service
apiVersion: v1
kind: Service
metadata:
  name: explorer-service
  namespace: asi-chain
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: explorer
---
# Wallet Service
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: asi-chain
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: wallet
---
# Faucet Service
apiVersion: v1
kind: Service
metadata:
  name: faucet-service
  namespace: asi-chain
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: faucet