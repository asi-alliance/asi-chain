apiVersion: v1
kind: ConfigMap
metadata:
  name: validator-config
  namespace: asi-chain
data:
  genesis.json: |
    {
      "config": {
        "chainId": 42161,
        "homesteadBlock": 0,
        "eip150Block": 0,
        "eip155Block": 0,
        "eip158Block": 0,
        "byzantiumBlock": 0,
        "constantinopleBlock": 0,
        "petersburgBlock": 0,
        "istanbulBlock": 0,
        "berlinBlock": 0,
        "londonBlock": 0,
        "poa": {
          "period": 2,
          "epoch": 30000
        }
      },
      "difficulty": "1",
      "gasLimit": "30000000",
      "alloc": {}
    }
---
apiVersion: v1
kind: Service
metadata:
  name: validator-1
  namespace: asi-chain
  labels:
    app: validator
    validator-id: "1"
spec:
  type: ClusterIP
  ports:
    - port: 8545
      targetPort: 8545
      name: rpc
    - port: 8546
      targetPort: 8546
      name: ws
    - port: 30303
      targetPort: 30303
      name: p2p
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: validator
    validator-id: "1"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validator-1
  namespace: asi-chain
spec:
  serviceName: validator-1
  replicas: 1
  selector:
    matchLabels:
      app: validator
      validator-id: "1"
  template:
    metadata:
      labels:
        app: validator
        validator-id: "1"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        NodeType: validator
      tolerations:
      - key: validator
        operator: Equal
        value: "true"
        effect: NoSchedule
      containers:
      - name: geth
        image: ethereum/client-go:latest
        ports:
        - containerPort: 8545
          name: rpc
        - containerPort: 8546
          name: ws
        - containerPort: 30303
          name: p2p
        - containerPort: 9090
          name: metrics
        env:
        - name: NETWORK_ID
          value: "42161"
        - name: VALIDATOR_ADDRESS
          valueFrom:
            secretKeyRef:
              name: validator-1-keys
              key: address
        volumeMounts:
        - name: data
          mountPath: /root/.ethereum
        - name: genesis
          mountPath: /genesis.json
          subPath: genesis.json
        - name: validator-key
          mountPath: /keys
          readOnly: true
        command:
        - geth
        - --networkid=42161
        - --datadir=/root/.ethereum
        - --syncmode=full
        - --gcmode=archive
        - --http
        - --http.addr=0.0.0.0
        - --http.port=8545
        - --http.api=eth,net,web3,debug,miner,personal,txpool,admin
        - --http.corsdomain=*
        - --http.vhosts=*
        - --ws
        - --ws.addr=0.0.0.0
        - --ws.port=8546
        - --ws.api=eth,net,web3,debug,miner,personal,txpool,admin
        - --ws.origins=*
        - --mine
        - --miner.threads=2
        - --miner.etherbase=$(VALIDATOR_ADDRESS)
        - --metrics
        - --metrics.addr=0.0.0.0
        - --metrics.port=9090
        - --pprof
        - --pprof.addr=0.0.0.0
        - --pprof.port=6060
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        livenessProbe:
          httpGet:
            path: /
            port: 8545
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8545
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: genesis
        configMap:
          name: validator-config
      - name: validator-key
        secret:
          secretName: validator-1-keys
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp3
      resources:
        requests:
          storage: 500Gi
---
