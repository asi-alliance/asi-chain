apiVersion: apps/v1
kind: Deployment
metadata:
  name: explorer
  namespace: asi-chain
  labels:
    app: explorer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: explorer
  template:
    metadata:
      labels:
        app: explorer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: explorer
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/asi-explorer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: RPC_URL
          value: "http://rpc-service:8545"
        - name: WS_URL
          value: "ws://ws-service:8546"
        - name: CHAIN_ID
          value: "42161"
        - name: NETWORK_NAME
          value: "ASI Testnet"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        - name: HASURA_GRAPHQL_ENDPOINT
          value: "http://hasura:8080/v1/graphql"
        - name: HASURA_ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: hasura-credentials
              key: admin-secret
        - name: INDEXER_URL
          value: "http://indexer-service:4000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: explorer-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: explorer-config
  namespace: asi-chain
data:
  config.json: |
    {
      "features": {
        "search": true,
        "analytics": true,
        "export": true,
        "realtime": true,
        "contracts": true,
        "tokens": true,
        "validators": true
      },
      "pagination": {
        "defaultLimit": 25,
        "maxLimit": 100
      },
      "cache": {
        "ttl": 60,
        "enabled": true
      },
      "metrics": {
        "updateInterval": 10000,
        "historyDays": 30
      }
    }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: explorer-hpa
  namespace: asi-chain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: explorer
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: explorer-pdb
  namespace: asi-chain
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: explorer