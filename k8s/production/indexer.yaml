apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer
  namespace: asi-chain
  labels:
    app: indexer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: indexer
  template:
    metadata:
      labels:
        app: indexer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: indexer
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/asi-indexer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "4000"
        - name: RPC_URL
          value: "http://rpc-service:8545"
        - name: WS_URL
          value: "ws://ws-service:8546"
        - name: CHAIN_ID
          value: "42161"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        - name: START_BLOCK
          value: "0"
        - name: BATCH_SIZE
          value: "100"
        - name: CONCURRENCY
          value: "10"
        - name: REORG_THRESHOLD
          value: "10"
        - name: INDEX_TRANSACTIONS
          value: "true"
        - name: INDEX_LOGS
          value: "true"
        - name: INDEX_TRACES
          value: "true"
        - name: INDEX_CONTRACTS
          value: "true"
        - name: INDEX_TOKENS
          value: "true"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: indexer-config
---
apiVersion: v1
kind: Service
metadata:
  name: indexer-service
  namespace: asi-chain
spec:
  type: ClusterIP
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
  selector:
    app: indexer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: indexer-config
  namespace: asi-chain
data:
  config.json: |
    {
      "indexing": {
        "parallel": true,
        "retryAttempts": 3,
        "retryDelay": 1000,
        "confirmations": 3
      },
      "contracts": {
        "asi_token": "0x0000000000000000000000000000000000000001",
        "staking": "0x0000000000000000000000000000000000000002",
        "governance": "0x0000000000000000000000000000000000000003",
        "faucet": "0x0000000000000000000000000000000000000004"
      },
      "events": {
        "Transfer": true,
        "Approval": true,
        "Staked": true,
        "Unstaked": true,
        "ProposalCreated": true,
        "Voted": true
      }
    }
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: indexer-reorg-check
  namespace: asi-chain
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: reorg-checker
            image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/asi-indexer:latest
            command:
            - python
            - -c
            - |
              import requests
              import os
              
              # Check for chain reorganizations
              rpc_url = os.environ.get('RPC_URL', 'http://rpc-service:8545')
              
              # Get latest block from chain
              chain_response = requests.post(rpc_url, json={
                  'jsonrpc': '2.0',
                  'method': 'eth_blockNumber',
                  'params': [],
                  'id': 1
              })
              
              chain_height = int(chain_response.json()['result'], 16)
              
              # Get indexed height from database
              # ... database query logic ...
              
              # If reorg detected, trigger re-indexing
              # ... reorg handling logic ...
              
              print(f"Chain height: {chain_height}, no reorg detected")
            env:
            - name: RPC_URL
              value: "http://rpc-service:8545"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: url
          restartPolicy: OnFailure
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: indexer-hpa
  namespace: asi-chain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: indexer
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80