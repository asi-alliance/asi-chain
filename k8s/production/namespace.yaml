apiVersion: v1
kind: Namespace
metadata:
  name: asi-chain
  labels:
    name: asi-chain
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: asi-chain-quota
  namespace: asi-chain
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "200Gi"
    requests.storage: "1Ti"
    persistentvolumeclaims: "20"
    services.loadbalancers: "5"