# Vertical Pod Autoscaler configurations for automatic resource optimization
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: asi-wallet-vpa
  namespace: asi-chain
  labels:
    app: asi-wallet
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asi-wallet
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: asi-wallet
      minAllowed:
        cpu: 50m
        memory: 128Mi
      maxAllowed:
        cpu: 1
        memory: 1Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits
---
