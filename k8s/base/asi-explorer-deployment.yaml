apiVersion: apps/v1
kind: Deployment
metadata:
  name: asi-explorer
  namespace: asi-chain
  labels:
    app: asi-explorer
    app.kubernetes.io/name: asi-explorer
    app.kubernetes.io/instance: asi-chain-explorer
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: asi-chain-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: asi-explorer
  template:
    metadata:
      labels:
        app: asi-explorer
        app.kubernetes.io/name: asi-explorer
        app.kubernetes.io/instance: asi-chain-explorer
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: asi-explorer
        image: asi-explorer:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REACT_APP_GRAPHQL_URL
          value: "http://hasura:8080/v1/graphql"
        - name: REACT_APP_GRAPHQL_WS_URL
          value: "ws://hasura:8080/v1/graphql"
        - name: REACT_APP_HASURA_ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: hasura-secret
              key: admin-secret
        - name: REACT_APP_RCHAIN_NODE_URL
          value: "http://rnode.readonly:40453"
        - name: REACT_APP_ENVIRONMENT
          value: "production"
        - name: REACT_APP_CACHE_ENABLED
          value: "true"
        - name: REACT_APP_REDIS_URL
          value: "redis://redis-primary:6379"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: asi-explorer
  namespace: asi-chain
  labels:
    app: asi-explorer
spec:
  selector:
    app: asi-explorer
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asi-explorer-hpa
  namespace: asi-chain
  labels:
    app: asi-explorer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asi-explorer
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60