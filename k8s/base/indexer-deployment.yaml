apiVersion: apps/v1
kind: Deployment
metadata:
  name: asi-indexer
  namespace: asi-chain
  labels:
    app: asi-indexer
    app.kubernetes.io/name: asi-indexer
    app.kubernetes.io/instance: asi-chain-indexer
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: asi-chain-platform
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: asi-indexer
  template:
    metadata:
      labels:
        app: asi-indexer
        app.kubernetes.io/name: asi-indexer
        app.kubernetes.io/instance: asi-chain-indexer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: asi-indexer
        image: asi-indexer:latest
        ports:
        - containerPort: 9090
          name: metrics
        env:
        - name: NODE_URL
          value: "http://rnode.readonly:40453"
        - name: REDIS_URL
          value: "redis://redis-primary:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: database-url
        - name: CACHE_TTL
          value: "300"
        - name: BATCH_SIZE
          value: "100"
        - name: ENABLE_METRICS
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: SYNC_INTERVAL
          value: "5"
        - name: ENABLE_REV_TRANSFER_EXTRACTION
          value: "true"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: asi-indexer
  namespace: asi-chain
  labels:
    app: asi-indexer
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: asi-indexer
  ports:
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asi-indexer-hpa
  namespace: asi-chain
  labels:
    app: asi-indexer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asi-indexer
  minReplicas: 3
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: rchain_blocks_behind
      target:
        type: AverageValue
        averageValue: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60