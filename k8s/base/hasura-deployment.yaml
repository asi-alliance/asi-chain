apiVersion: apps/v1
kind: Deployment
metadata:
  name: hasura
  namespace: asi-chain
  labels:
    app: hasura
    app.kubernetes.io/name: hasura
    app.kubernetes.io/instance: asi-chain-hasura
    app.kubernetes.io/version: "2.36.0"
    app.kubernetes.io/component: graphql-api
    app.kubernetes.io/part-of: asi-chain-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: hasura
  template:
    metadata:
      labels:
        app: hasura
        app.kubernetes.io/name: hasura
        app.kubernetes.io/instance: asi-chain-hasura
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: hasura
        image: hasura/graphql-engine:v2.36.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: HASURA_GRAPHQL_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: database-url
        - name: HASURA_GRAPHQL_REDIS_URL
          value: "redis://redis-primary:6379"
        - name: HASURA_GRAPHQL_ENABLE_CONSOLE
          value: "true"
        - name: HASURA_GRAPHQL_ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: hasura-secret
              key: admin-secret
        - name: HASURA_GRAPHQL_UNAUTHORIZED_ROLE
          value: "public"
        - name: HASURA_GRAPHQL_QUERY_PLAN_CACHE_SIZE
          value: "1000"
        - name: HASURA_GRAPHQL_ENABLE_QUERY_CACHING
          value: "true"
        - name: HASURA_GRAPHQL_CACHE_SIZE
          value: "100MB"
        - name: HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_REFETCH_INTERVAL
          value: "1000"
        - name: HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_BATCH_SIZE
          value: "100"
        - name: HASURA_GRAPHQL_STREAMING_QUERIES_MULTIPLEXED_REFETCH_INTERVAL
          value: "500"
        - name: HASURA_GRAPHQL_STREAMING_QUERIES_MULTIPLEXED_BATCH_SIZE
          value: "100"
        - name: HASURA_GRAPHQL_ENABLE_TELEMETRY
          value: "false"
        - name: HASURA_GRAPHQL_CORS_DOMAIN
          value: "*"
        - name: HASURA_GRAPHQL_WS_READ_COOKIE
          value: "false"
        - name: HASURA_GRAPHQL_STRINGIFY_NUMERIC_TYPES
          value: "true"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hasura
  namespace: asi-chain
  labels:
    app: hasura
spec:
  selector:
    app: hasura
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hasura-hpa
  namespace: asi-chain
  labels:
    app: hasura
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hasura
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60