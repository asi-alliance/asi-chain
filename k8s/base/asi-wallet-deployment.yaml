apiVersion: apps/v1
kind: Deployment
metadata:
  name: asi-wallet
  namespace: asi-chain
  labels:
    app: asi-wallet
    app.kubernetes.io/name: asi-wallet
    app.kubernetes.io/instance: asi-chain-wallet
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: asi-chain-platform
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: asi-wallet
  template:
    metadata:
      labels:
        app: asi-wallet
        app.kubernetes.io/name: asi-wallet
        app.kubernetes.io/instance: asi-chain-wallet
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: asi-wallet
        image: asi-wallet:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: REACT_APP_WALLETCONNECT_PROJECT_ID
          value: "4c8ec18817ffbbce4b824f14928d0f8b"
        - name: REACT_APP_RCHAIN_HTTP_URL
          value: "http://rnode.readonly:40403"
        - name: REACT_APP_RCHAIN_GRPC_URL
          value: "http://rnode.bootstrap:40401"
        - name: REACT_APP_RCHAIN_READONLY_URL
          value: "http://rnode.readonly:40403"
        - name: REACT_APP_NETWORK_NAME
          value: "ASI Chain Testnet"
        - name: REACT_APP_CACHE_ENABLED
          value: "true"
        - name: REACT_APP_REDIS_URL
          value: "redis://redis-primary:6379"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: asi-wallet
  namespace: asi-chain
  labels:
    app: asi-wallet
spec:
  selector:
    app: asi-wallet
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asi-wallet-hpa
  namespace: asi-chain
  labels:
    app: asi-wallet
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asi-wallet
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60