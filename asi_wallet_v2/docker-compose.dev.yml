version: '3.8'

services:
  asi-wallet-dev:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    container_name: asi-wallet-v2-dev
    ports:
      - "3000:3000"
    environment:
      # WalletConnect Project ID
      - REACT_APP_WALLETCONNECT_PROJECT_ID=${WALLETCONNECT_PROJECT_ID:-4c8ec18817ffbbce4b824f14928d0f8b}
      
      # RChain Network Configuration
      - REACT_APP_RCHAIN_HTTP_URL=${RCHAIN_HTTP_URL:-http://host.docker.internal:40403}
      - REACT_APP_RCHAIN_GRPC_URL=${RCHAIN_GRPC_URL:-http://host.docker.internal:40401}
      - REACT_APP_RCHAIN_READONLY_URL=${RCHAIN_READONLY_URL:-http://host.docker.internal:40403}
      
      # Development server settings
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3000
      - CHOKIDAR_USEPOLLING=true
    
    volumes:
      # Mount source code for hot-reload
      - ./src:/app/src
      - ./public:/app/public
    
    stdin_open: true
    tty: true
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    restart: unless-stopped