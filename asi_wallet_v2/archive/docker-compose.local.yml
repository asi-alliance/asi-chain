version: '3.8'

services:
  asi-wallet:
    image: asi-wallet-v2:latest
    container_name: asi-wallet-v2-local
    ports:
      - "3000:80"
    environment:
      # WalletConnect Project ID
      - REACT_APP_WALLETCONNECT_PROJECT_ID=4c8ec18817ffbbce4b824f14928d0f8b
      
      # Connect to AWS Lightsail F1R3FLY blockchain
      - REACT_APP_RCHAIN_HTTP_URL=http://54.254.197.253:40403
      - REACT_APP_RCHAIN_GRPC_URL=http://54.254.197.253:40401
      - REACT_APP_RCHAIN_READONLY_URL=http://54.254.197.253:40453
      
      # Network name for display
      - REACT_APP_NETWORK_NAME=ASI Chain Testnet
      
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    # Add extra hosts for local development
    extra_hosts:
      - "host.docker.internal:host-gateway"