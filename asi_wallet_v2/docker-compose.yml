version: '3.8'

services:
  asi-wallet:
    build: .
    container_name: asi-wallet-v2
    ports:
      - "3000:80"
    environment:
      # WalletConnect Project ID
      - REACT_APP_WALLETCONNECT_PROJECT_ID=${WALLETCONNECT_PROJECT_ID:-4c8ec18817ffbbce4b824f14928d0f8b}
      
      # RChain Network Configuration
      # For local RChain node running on host machine:
      - REACT_APP_RCHAIN_HTTP_URL=${RCHAIN_HTTP_URL:-http://host.docker.internal:40403}
      - REACT_APP_RCHAIN_GRPC_URL=${RCHAIN_GRPC_URL:-http://host.docker.internal:40401}
      - REACT_APP_RCHAIN_READONLY_URL=${RCHAIN_READONLY_URL:-http://host.docker.internal:40403}
      
      # For RChain node in Docker network (uncomment if using):
      # - REACT_APP_RCHAIN_HTTP_URL=http://rnode.readonly:40403
      # - REACT_APP_RCHAIN_GRPC_URL=http://rnode.bootstrap:40401
      # - REACT_APP_RCHAIN_READONLY_URL=http://rnode.readonly:40403
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    # If you need to connect to RChain nodes in a Docker network:
    # networks:
    #   - rchain-network

# If connecting to RChain Docker network:
# networks:
#   rchain-network:
#     external: true
#     name: node_rchain-network