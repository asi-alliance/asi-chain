<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- ASI Logo - simplified accurate representation -->
  <g id="asi-logo" fill="#1A1A1A">
    <!-- Center circle -->
    <circle cx="50" cy="50" r="6"/>
    
    <!-- Left horizontal oval with nodes -->
    <ellipse cx="30" cy="50" rx="12" ry="8"/>
    <!-- Left top node -->
    <circle cx="30" cy="35" r="7"/>
    <rect x="26" y="35" width="8" height="8" fill="#1A1A1A"/>
    <!-- Left bottom node -->
    <circle cx="30" cy="65" r="7"/>
    <rect x="26" y="57" width="8" height="8" fill="#1A1A1A"/>
    
    <!-- Right horizontal oval with nodes -->
    <ellipse cx="70" cy="50" rx="12" ry="8"/>
    <!-- Right top node -->
    <circle cx="70" cy="35" r="7"/>
    <rect x="66" y="35" width="8" height="8" fill="#1A1A1A"/>
    <!-- Right bottom node -->
    <circle cx="70" cy="65" r="7"/>
    <rect x="66" y="57" width="8" height="8" fill="#1A1A1A"/>
    
    <!-- Horizontal connector -->
    <rect x="35" y="47" width="30" height="6" rx="3" fill="#1A1A1A"/>
  </g>
</svg>