<svg width="700" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="validatorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7FD67A;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7FD67A;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="messageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8E6A3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4F0C1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="consensusGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FD67A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8E6A3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with network pattern -->
  <rect width="700" height="500" fill="#0f1419"/>
  <defs>
    <pattern id="networkGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1a2028" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="700" height="500" fill="url(#networkGrid)"/>
  
  <!-- Validator Nodes -->
  <!-- Validator 1 (Leader/Proposer) -->
  <g id="validator1" transform="translate(350, 100)">
    <circle r="35" fill="url(#validatorGlow)">
      <animate attributeName="r" values="30;40;30" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="25" fill="#7FD67A">
      <animate attributeName="r" values="20;30;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="#000" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7FD67A" font-weight="bold">V1</text>
    <text y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7FD67A">Leader</text>
    <text y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#A8E6A3">Proposing Block</text>
  </g>
  
  <!-- Validator 2 -->
  <g id="validator2" transform="translate(150, 200)">
    <circle r="30" fill="url(#validatorGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
      <animate attributeName="r" values="25;35;25" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="#A8E6A3" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <circle r="12" fill="#000" opacity="0">
      <animate attributeName="opacity" values="0;0.8" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold" opacity="0">
      V2
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
    <text y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#A8E6A3" opacity="0">
      Validator
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
  </g>
  
  <!-- Validator 3 -->
  <g id="validator3" transform="translate(550, 200)">
    <circle r="30" fill="url(#validatorGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
      <animate attributeName="r" values="25;35;25" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="#A8E6A3" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <circle r="12" fill="#000" opacity="0">
      <animate attributeName="opacity" values="0;0.8" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold" opacity="0">
      V3
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
    <text y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#A8E6A3" opacity="0">
      Validator
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
  </g>
  
  <!-- Validator 4 -->
  <g id="validator4" transform="translate(200, 350)">
    <circle r="30" fill="url(#validatorGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
      <animate attributeName="r" values="25;35;25" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="#A8E6A3" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <circle r="12" fill="#000" opacity="0">
      <animate attributeName="opacity" values="0;0.8" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold" opacity="0">
      V4
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
    <text y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#A8E6A3" opacity="0">
      Validator
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
  </g>
  
  <!-- Validator 5 -->
  <g id="validator5" transform="translate(500, 350)">
    <circle r="30" fill="url(#validatorGlow)" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
      <animate attributeName="r" values="25;35;25" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="20" fill="#A8E6A3" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <circle r="12" fill="#000" opacity="0">
      <animate attributeName="opacity" values="0;0.8" dur="1s" begin="2s" fill="freeze"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold" opacity="0">
      V5
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
    <text y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#A8E6A3" opacity="0">
      Validator
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze"/>
    </text>
  </g>
  
  <!-- Consensus Messages -->
  <g stroke="url(#messageGradient)" stroke-width="3" fill="none" opacity="0.7">
    <!-- Leader to Validator 2 -->
    <path d="M 330 120 Q 240 160 170 180" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="3s"/>
    </path>
    
    <!-- Leader to Validator 3 -->
    <path d="M 370 120 Q 460 160 530 180" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="3s"/>
    </path>
    
    <!-- Leader to Validator 4 -->
    <path d="M 330 130 Q 265 240 220 330" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="3s"/>
    </path>
    
    <!-- Leader to Validator 5 -->
    <path d="M 370 130 Q 435 240 480 330" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="3s"/>
    </path>
    
    <!-- Response messages (Pre-commit) -->
    <path d="M 170 180 Q 240 140 330 120" opacity="0" stroke="#C4F0C1">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="5s"/>
    </path>
    
    <path d="M 530 180 Q 460 140 370 120" opacity="0" stroke="#C4F0C1">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="5s"/>
    </path>
    
    <path d="M 220 330 Q 285 220 330 130" opacity="0" stroke="#C4F0C1">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="5s"/>
    </path>
    
    <path d="M 480 330 Q 415 220 370 130" opacity="0" stroke="#C4F0C1">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="5s"/>
    </path>
  </g>
  
  <!-- Proposal Block -->
  <g id="proposalBlock" transform="translate(300, 250)" opacity="0">
    <rect width="100" height="60" rx="8" fill="url(#consensusGradient)" stroke="#7FD67A" stroke-width="2"/>
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">
      Proposed Block
    </text>
    <text x="50" y="35" text-anchor="middle" font-family="monospace" font-size="8" fill="#000">
      Block #1337
    </text>
    <text x="50" y="48" text-anchor="middle" font-family="monospace" font-size="6" fill="#000">
      Hash: 0xabc123...
    </text>
    
    <animate attributeName="opacity" values="0;1" dur="1s" begin="3s" fill="freeze"/>
    
    <!-- Pulsing effect for consensus -->
    <circle cx="50" cy="30" r="5" fill="#7FD67A" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="7s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;15;5" dur="2s" begin="7s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Consensus Status Messages -->
  <g transform="translate(50, 450)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#7FD67A" opacity="0">
      Phase 1: Block Proposal
      <animate attributeName="opacity" values="0;1" dur="1s" begin="3s" fill="freeze"/>
    </text>
    
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="12" fill="#A8E6A3" opacity="0">
      Phase 2: Pre-commit Votes
      <animate attributeName="opacity" values="0;1" dur="1s" begin="5s" fill="freeze"/>
    </text>
    
    <text x="400" y="0" font-family="Arial, sans-serif" font-size="12" fill="#C4F0C1" opacity="0">
      Phase 3: Consensus Achieved
      <animate attributeName="opacity" values="0;1" dur="1s" begin="7s" fill="freeze"/>
    </text>
  </g>
  
  <!-- Vote tally -->
  <g id="voteTally" transform="translate(450, 250)" opacity="0">
    <rect width="80" height="60" rx="4" fill="#2a2a2a" stroke="#A8E6A3" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#A8E6A3" font-weight="bold">
      Vote Tally
    </text>
    <text x="40" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="#7FD67A">
      ✓ 4/5 Votes
    </text>
    <text x="40" y="45" text-anchor="middle" font-family="monospace" font-size="8" fill="#C4F0C1">
      Consensus!
    </text>
    
    <animate attributeName="opacity" values="0;1" dur="1s" begin="7s" fill="freeze"/>
  </g>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#consensusGradient)">
    CBC Casper Consensus Mechanism
  </text>
  
  <!-- Subtitle -->
  <text x="350" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#A8E6A3">
    Proof-of-Stake Validator Network
  </text>
  
  <!-- Network status -->
  <g transform="translate(20, 20)">
    <circle r="4" fill="#7FD67A">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#7FD67A">
      5 Active Validators • 30s Block Time
    </text>
  </g>
</svg>