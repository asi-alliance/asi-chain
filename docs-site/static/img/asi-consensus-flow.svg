<svg width="800" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7FD67A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4F0C1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="150" fill="#ffffff"/>
  
  <!-- Process flow -->
  <g id="flow">
    <!-- Step 1: Deploy -->
    <g transform="translate(100, 75)">
      <rect x="-40" y="-25" width="80" height="50" rx="8" fill="#E8F5E8" stroke="#7FD67A" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">Deploy</text>
      <circle cx="0" cy="-35" r="3" fill="#7FD67A">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Arrow 1 -->
    <path d="M 140 75 L 200 75" stroke="url(#flowGradient)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <circle r="3" fill="#7FD67A">
      <animateMotion dur="2s" repeatCount="indefinite">
        <mpath href="#arrow1"/>
      </animateMotion>
    </circle>
    <path id="arrow1" d="M 140 75 L 200 75" fill="none"/>
    
    <!-- Step 2: Validate -->
    <g transform="translate(250, 75)">
      <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#E8F5E8" stroke="#7FD67A" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">Validate</text>
      <circle cx="0" cy="-35" r="3" fill="#7FD67A">
        <animate attributeName="r" values="3;5;3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Arrow 2 -->
    <path d="M 295 75 L 355 75" stroke="url(#flowGradient)" stroke-width="2" fill="none"/>
    <circle r="3" fill="#7FD67A">
      <animateMotion dur="2s" begin="0.5s" repeatCount="indefinite">
        <mpath href="#arrow2"/>
      </animateMotion>
    </circle>
    <path id="arrow2" d="M 295 75 L 355 75" fill="none"/>
    
    <!-- Step 3: Consensus -->
    <g transform="translate(400, 75)">
      <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#E8F5E8" stroke="#7FD67A" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">Consensus</text>
      <circle cx="0" cy="-35" r="3" fill="#7FD67A">
        <animate attributeName="r" values="3;5;3" dur="2s" begin="1s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Arrow 3 -->
    <path d="M 445 75 L 505 75" stroke="url(#flowGradient)" stroke-width="2" fill="none"/>
    <circle r="3" fill="#7FD67A">
      <animateMotion dur="2s" begin="1s" repeatCount="indefinite">
        <mpath href="#arrow3"/>
      </animateMotion>
    </circle>
    <path id="arrow3" d="M 445 75 L 505 75" fill="none"/>
    
    <!-- Step 4: Execute -->
    <g transform="translate(550, 75)">
      <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#E8F5E8" stroke="#7FD67A" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">Execute</text>
      <circle cx="0" cy="-35" r="3" fill="#7FD67A">
        <animate attributeName="r" values="3;5;3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Arrow 4 -->
    <path d="M 595 75 L 655 75" stroke="url(#flowGradient)" stroke-width="2" fill="none"/>
    <circle r="3" fill="#7FD67A">
      <animateMotion dur="2s" begin="1.5s" repeatCount="indefinite">
        <mpath href="#arrow4"/>
      </animateMotion>
    </circle>
    <path id="arrow4" d="M 595 75 L 655 75" fill="none"/>
    
    <!-- Step 5: Finalize -->
    <g transform="translate(700, 75)">
      <rect x="-40" y="-25" width="80" height="50" rx="8" fill="url(#flowGradient)" stroke="none"/>
      <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="#1A1A1A">Finalize</text>
      <circle cx="0" cy="-35" r="3" fill="#1A1A1A">
        <animate attributeName="r" values="3;5;3" dur="2s" begin="2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7FD67A"/>
    </marker>
  </defs>
  
  <!-- Labels -->
  <text x="400" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#808080">CBC Casper Consensus Flow - 30 second blocks</text>
</svg>