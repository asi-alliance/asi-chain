<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- ASI Symbol - Green version for ASI Chain -->
  <g transform="translate(10, 10)">
    <!-- Center circle -->
    <circle cx="20" cy="20" r="4" fill="#7FD67A"/>
    
    <!-- Top and bottom nodes -->
    <circle cx="20" cy="5" r="7" fill="#A8E6A3"/>
    <circle cx="20" cy="35" r="7" fill="#A8E6A3"/>
    
    <!-- Left and right nodes -->  
    <circle cx="5" cy="20" r="7" fill="#A8E6A3"/>
    <circle cx="35" cy="20" r="7" fill="#A8E6A3"/>
    
    <!-- Corner connector nodes -->
    <circle cx="8" cy="8" r="5" fill="#C4F0C1"/>
    <circle cx="32" cy="8" r="5" fill="#C4F0C1"/>
    <circle cx="8" cy="32" r="5" fill="#C4F0C1"/>
    <circle cx="32" cy="32" r="5" fill="#C4F0C1"/>
  </g>
</svg>