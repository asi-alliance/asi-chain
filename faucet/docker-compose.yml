services:
  faucet:
    build: .
    container_name: asi-chain-faucet
    ports:
      - "5050:5000"
    environment:
      # Faucet Configuration
      - FAUCET_PRIVATE_KEY=${FAUCET_PRIVATE_KEY:-}
      - FAUCET_AMOUNT=${FAUCET_AMOUNT:-100}
      
      # Network Configuration
      - VALIDATOR_URL=${VALIDATOR_URL:-http://13.251.66.61:40413}
      - READONLY_URL=${READONLY_URL:-http://13.251.66.61:40453}
      - GRAPHQL_URL=${GRAPHQL_URL:-http://13.251.66.61:8080/v1/graphql}
      
      # Security Configuration  
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-}
      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY:-}
      
      # Performance Configuration
      - PHLO_LIMIT=${PHLO_LIMIT:-500000}
      - PHLO_PRICE=${PHLO_PRICE:-1}
      
      # Database Configuration
      - DATABASE_PATH=/app/data/faucet.db
      
    volumes:
      - faucet_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - faucet_network

volumes:
  faucet_data:
    driver: local

networks:
  faucet_network:
    driver: bridge