global
    maxconn 4096
    log stdout local0
    log stdout local1 notice
    daemon

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httplog
    option dontlognull
    option forwardfor
    option http-server-close

# Statistics
stats enable
stats uri /stats
stats refresh 30s
stats show-node
stats auth admin:asi-chain-2024

# Frontend for HTTP RPC
frontend http_rpc
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/asi-chain.pem
    redirect scheme https if !{ ssl_fc }
    
    # ACL for different paths
    acl is_rpc path_beg /rpc
    acl is_ws path_beg /ws
    acl is_explorer path_beg /explorer
    acl is_api path_beg /api
    
    # Route to appropriate backend
    use_backend rpc_servers if is_rpc
    use_backend ws_servers if is_ws
    use_backend explorer_backend if is_explorer
    use_backend api_servers if is_api
    default_backend rpc_servers

# Backend for RPC servers (round-robin)
backend rpc_servers
    balance roundrobin
    option httpchk POST /
    http-check send meth POST uri / body "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}"
    http-check expect status 200
    
    server validator1 validator-1:8545 check weight 100
    server validator2 validator-2:8545 check weight 100
    server validator3 validator-3:8545 check weight 100
    server validator4 validator-4:8545 check weight 100

# Backend for WebSocket connections (source IP hash for session persistence)
backend ws_servers
    balance source
    option http-server-close
    option forceclose
    
    server validator1_ws validator-1:8546 check weight 100
    server validator2_ws validator-2:8546 check weight 100
    server validator3_ws validator-3:8546 check weight 100
    server validator4_ws validator-4:8546 check weight 100

# Backend for Explorer
backend explorer_backend
    balance roundrobin
    server explorer1 explorer:3000 check

# Backend for API servers
backend api_servers
    balance roundrobin
    option httpchk GET /health
    
    server validator1_api validator-1:8545 check weight 100
    server validator2_api validator-2:8545 check weight 100
    server validator3_api validator-3:8545 check weight 100
    server validator4_api validator-4:8545 check weight 100

# Frontend for validator p2p communication
frontend p2p_tcp
    bind *:30303
    mode tcp
    default_backend p2p_servers

backend p2p_servers
    mode tcp
    balance roundrobin
    server validator1_p2p validator-1:30303 check
    server validator2_p2p validator-2:30303 check
    server validator3_p2p validator-3:30303 check
    server validator4_p2p validator-4:30303 check