global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'asi-chain-monitor'
    environment: 'testnet'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rules for alerts
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Validator nodes metrics
  - job_name: 'validators'
    metrics_path: '/debug/metrics/prometheus'
    static_configs:
      - targets:
          - 'validator-1:6060'
          - 'validator-2:6060'
          - 'validator-3:6060'
          - 'validator-4:6060'
        labels:
          group: 'validators'
    relabel_configs:
      - source_labels: [__address__]
        regex: '(validator-\d+):.*'
        target_label: instance
        replacement: '$1'

  # HAProxy metrics
  - job_name: 'haproxy'
    static_configs:
      - targets: ['load-balancer:8404']
        labels:
          instance: 'load-balancer'

  # PostgreSQL exporter
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          instance: 'postgres'

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          instance: 'redis'

  # Node exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          instance: 'system'

  # Indexer metrics
  - job_name: 'indexer'
    static_configs:
      - targets: ['indexer:8080']
        labels:
          instance: 'indexer'

  # Explorer metrics
  - job_name: 'explorer'
    static_configs:
      - targets: ['explorer:3001']
        labels:
          instance: 'explorer'

# Blockchain-specific metrics
  - job_name: 'blockchain_metrics'
    metrics_path: '/metrics'
    params:
      format: ['prometheus']
    static_configs:
      - targets:
          - 'validator-1:8545'
          - 'validator-2:8545'
          - 'validator-3:8545'
          - 'validator-4:8545'
    relabel_configs:
      - source_labels: [__address__]
        regex: '.*:8545'
        target_label: __metrics_path__
        replacement: '/debug/metrics'