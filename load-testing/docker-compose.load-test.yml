version: '3.8'

services:
  # Grafana for load test visualization
  grafana-load-test:
    image: grafana/grafana:latest
    container_name: asi-load-test-grafana
    ports:
      - "3003:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-load-data:/var/lib/grafana
    networks:
      - load-test-network

  # InfluxDB for K6 metrics
  influxdb:
    image: influxdb:1.8
    container_name: asi-load-test-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - load-test-network

  # K6 Load Test Runner
  k6:
    image: loadimpact/k6:latest
    container_name: asi-load-test-k6
    environment:
      - BASE_URL=http://blockchain-node:8545
      - WS_URL=ws://blockchain-node:8546
      - EXPLORER_API=http://explorer:3001/api
      - WALLET_API=http://wallet:3002/api
      - K6_OUT=influxdb=http://influxdb:8086/k6
    volumes:
      - ./:/scripts
    command: run --vus 1000 --duration 10m /scripts/k6-load-test.js
    networks:
      - load-test-network
    depends_on:
      - influxdb
      - mock-blockchain

  # Mock blockchain node for testing
  mock-blockchain:
    image: trufflesuite/ganache:latest
    container_name: asi-mock-blockchain
    ports:
      - "8545:8545"
      - "8546:8546"
    command: |
      -a 1000
      --blockTime 1
      --gasLimit 12000000
      --port 8545
      --ws
      --ws.port 8546
      --ws.host 0.0.0.0
      --host 0.0.0.0
    networks:
      - load-test-network
    volumes:
      - ganache-data:/data

  # Mock Explorer API
  mock-explorer:
    build:
      context: ./mock-services
      dockerfile: Dockerfile.explorer
    container_name: asi-mock-explorer
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=test
      - PORT=3001
    networks:
      - load-test-network

  # Mock Wallet API
  mock-wallet:
    build:
      context: ./mock-services
      dockerfile: Dockerfile.wallet
    container_name: asi-mock-wallet
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=test
      - PORT=3002
    networks:
      - load-test-network

  # Locust for additional load testing
  locust-master:
    image: locustio/locust:latest
    container_name: asi-locust-master
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --master --host http://blockchain-node:8545
    networks:
      - load-test-network

  locust-worker:
    image: locustio/locust:latest
    deploy:
      replicas: 4
    volumes:
      - ./locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py --worker --master-host locust-master
    networks:
      - load-test-network
    depends_on:
      - locust-master

networks:
  load-test-network:
    driver: bridge

volumes:
  grafana-load-data:
  influxdb-data:
  ganache-data: