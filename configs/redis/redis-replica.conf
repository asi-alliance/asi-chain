# ASI Chain Redis Replica Configuration
# Read-only replica for load distribution

# Include primary config
include /usr/local/etc/redis/redis.conf

# Network
bind 0.0.0.0
port 6379

# Replication configuration
replicaof asi-redis-primary 6379
replica-read-only yes
replica-priority 100

# Memory management (slightly less than primary)
maxmemory 700mb
maxmemory-policy allkeys-lru

# Replication settings
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 16mb
repl-backlog-ttl 3600

# Performance optimizations for replica
replica-serve-stale-data yes
replica-lazy-flush yes

# Logging
logfile /data/replica.log
loglevel notice

# Disable saving on replica (primary handles persistence)
save ""
appendonly no