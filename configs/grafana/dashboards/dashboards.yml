# ASI Chain Grafana Dashboards Configuration
apiVersion: 1

providers:
  # ASI Chain Infrastructure Dashboards
  - name: 'asi-infrastructure'
    orgId: 1
    folder: 'ASI Chain Infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/infrastructure

  # ASI Chain Application Dashboards
  - name: 'asi-applications'
    orgId: 1
    folder: 'ASI Chain Applications'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/applications

  # ASI Chain Blockchain Dashboards
  - name: 'asi-blockchain'
    orgId: 1
    folder: 'ASI Chain Blockchain'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/blockchain